services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "${DB_EXPOSE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - .env
    entrypoint: ["sh", "/app/entrypoint.sh"]
    command: ["gunicorn", "--reload", "--bind", "0.0.0.0:8000", "--workers", "3", "core.wsgi:application"]
    ports:
      - "${API_PORT:-9000}:8000"
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-public
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:9000}
      VITE_APP_MODE: user
      CHOKIDAR_USEPOLLING: "true"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend-public:/frontend
      - frontend_public_node_modules:/frontend/node_modules
    depends_on:
      - api
    restart: unless-stopped

  admin_frontend:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:9000}
      VITE_APP_MODE: admin
      CHOKIDAR_USEPOLLING: "true"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5174"]
    ports:
      - "${ADMIN_FRONTEND_PORT:-5174}:5174"
    volumes:
      - ./frontend-admin:/frontend
      - frontend_admin_node_modules:/frontend/node_modules
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_public_node_modules:
  frontend_admin_node_modules:
