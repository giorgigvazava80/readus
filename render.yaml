databases:
  - name: readus-db
    plan: free
    databaseName: readus
    user: readus

services:
  - type: web
    name: readus-api
    runtime: python
    plan: free
    buildCommand: cd api && pip install -r requirements.txt
    startCommand: cd api && sh entrypoint.sh gunicorn --bind 0.0.0.0:$PORT --workers 3 core.wsgi:application
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: readus-db
          property: connectionString
      - key: FRONTEND_BASE_URL
        value: https://readus-public.onrender.com
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "1"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: ROOT_EMAIL
        value: root@test.ge
      - key: ROOT_USERNAME
        value: root
      - key: ROOT_PASSWORD
        value: ChangeMe@123
      - key: BOOTSTRAP_ROOT
        value: "1"
      - key: BOOTSTRAP_FORCE_PASSWORD_CHANGE
        value: "1"
      - key: RUN_COLLECTSTATIC
        value: "1"

  - type: web
    runtime: static
    name: readus-public
    buildCommand: cd frontend-public && npm ci && npm run build
    staticPublishPath: ./frontend-public/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://readus-api.onrender.com
      - key: VITE_APP_MODE
        value: user
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: readus-admin
    buildCommand: cd frontend-admin && npm ci && npm run build
    staticPublishPath: ./frontend-admin/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://readus-api.onrender.com
      - key: VITE_APP_MODE
        value: admin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
