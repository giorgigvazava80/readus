databases:
  - name: readus-db
    plan: free
    databaseName: readus
    user: readus

services:
  - type: keyvalue
    name: readus-cache
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: readus-api
    runtime: python
    plan: free
    buildCommand: cd api && pip install -r requirements.txt
    startCommand: cd api && sh entrypoint.sh gunicorn --bind 0.0.0.0:$PORT --workers 3 core.wsgi:application
    healthCheckPath: /health/
    disk:
      name: readus-media
      mountPath: /var/data/media
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: readus-db
          property: connectionString
      - key: FRONTEND_BASE_URL
        value: https://readus-public.onrender.com
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "1"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: ROOT_EMAIL
        value: root@test.ge
      - key: ROOT_USERNAME
        value: root
      - key: ROOT_PASSWORD
        value: ChangeMe@123
      - key: BOOTSTRAP_ROOT
        value: "1"
      - key: BOOTSTRAP_FORCE_PASSWORD_CHANGE
        value: "1"
      - key: EMAIL_SEND_ASYNC
        value: "1"
      - key: CONTENT_UPLOAD_ASYNC
        value: "0"
      - key: EMAIL_TIMEOUT
        value: "10"
      - key: RUN_COLLECTSTATIC
        value: "1"
      - key: SERVE_MEDIA
        value: "1"
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: STATIC_BROWSER_CACHE_SECONDS
        value: "86400"
      - key: MEDIA_BROWSER_CACHE_SECONDS
        value: "3600"
      - key: CACHE_URL
        fromService:
          type: keyvalue
          name: readus-cache
          property: connectionString
      - key: CACHE_KEY_PREFIX
        value: readus
      - key: CACHE_DEFAULT_TIMEOUT
        value: "300"
      - key: CACHE_TTL_PUBLIC_LIST
        value: "120"
      - key: CACHE_TTL_PUBLIC_DETAIL
        value: "300"

  - type: web
    runtime: static
    name: readus-public
    buildCommand: cd frontend-public && npm ci && npm run build
    staticPublishPath: ./frontend-public/dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /favicon.ico
        name: Cache-Control
        value: public, max-age=86400, must-revalidate
      - path: /favicon.svg
        name: Cache-Control
        value: public, max-age=86400, must-revalidate
      - path: /placeholder.svg
        name: Cache-Control
        value: public, max-age=86400, must-revalidate
      - path: /robots.txt
        name: Cache-Control
        value: public, max-age=86400, must-revalidate
      - path: /index.html
        name: Cache-Control
        value: public, no-cache, must-revalidate
    envVars:
      - key: VITE_API_BASE_URL
        value: https://readus-api.onrender.com
      - key: VITE_APP_MODE
        value: user
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: readus-admin
    buildCommand: cd frontend-admin && npm ci && npm run build
    staticPublishPath: ./frontend-admin/dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /favicon.ico
        name: Cache-Control
        value: public, max-age=86400, must-revalidate
      - path: /favicon.svg
        name: Cache-Control
        value: public, max-age=86400, must-revalidate
      - path: /placeholder.svg
        name: Cache-Control
        value: public, max-age=86400, must-revalidate
      - path: /robots.txt
        name: Cache-Control
        value: public, max-age=86400, must-revalidate
      - path: /index.html
        name: Cache-Control
        value: public, no-cache, must-revalidate
    envVars:
      - key: VITE_API_BASE_URL
        value: https://readus-api.onrender.com
      - key: VITE_APP_MODE
        value: admin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
